name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source archive
        run: |
          tar czf reforger-captain-${GITHUB_REF_NAME}.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='data' \
            -C .. arma-server-captain

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: reforger-captain-${{ github.ref_name }}.tar.gz
