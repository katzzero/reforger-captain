services:
  reforger-admin:
    build: .
    container_name: reforger-admin
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ${SERVER_CONFIG_PATH:?Set SERVER_CONFIG_PATH in .env}:/reforger/config/server.json
      - ./admin-config.json:/app/admin-config.json
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MODE=${MODE:-full}
      - RCON_HOST=${RCON_HOST:-host.docker.internal}
      - RCON_PORT=${RCON_PORT:-29999}
      - RCON_PASSWORD=${RCON_PASSWORD:?Set RCON_PASSWORD in .env}
      - SERVER_CONTAINER=${SERVER_CONTAINER:-arma-reforger}
    extra_hosts:
      - "host.docker.internal:host-gateway"
